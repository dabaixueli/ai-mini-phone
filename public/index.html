<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMO 手机</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg"></div>

  <div class="phone-wrapper">
    <div class="phone-frame">
      <div class="phone-notch">
        <div class="notch-camera"></div>
      </div>

      <div class="phone-screen" id="phoneScreen">
        <!-- 关机状态 -->
        <div class="screen-off" id="screenOff">
          <div class="power-hint">按电源键开机</div>
        </div>

        <!-- 开机动画 -->
        <div class="boot-screen hidden" id="bootScreen">
          <div class="boot-logo">
            <div class="boot-icon">📱</div>
            <div class="boot-text">MIMO</div>
            <div class="boot-sub">Phone</div>
          </div>
          <div class="boot-loader">
            <div class="boot-loader-bar"></div>
          </div>
        </div>

        <!-- 锁屏 -->
        <div class="lock-screen hidden" id="lockScreen">
          <div class="status-bar">
            <div class="status-left">
              <span class="status-time" id="lockTime">00:00</span>
            </div>
            <div class="status-right">
              <span class="status-signal">📶</span>
              <span class="status-wifi">📡</span>
              <span class="status-battery">
                <span class="battery-icon">
                  <span class="battery-level" id="lockBattery"></span>
                </span>
                <span class="battery-text" id="lockBatteryText">80%</span>
              </span>
            </div>
          </div>
          <div class="lock-content">
            <div class="lock-time-display" id="lockTimeDisplay">00:00</div>
            <div class="lock-date-display" id="lockDateDisplay">5月4日 星期一</div>
          </div>
          <div class="lock-bottom">
            <div class="lock-swipe-hint">上滑解锁</div>
            <div class="lock-swipe-indicator">
              <div class="swipe-line"></div>
            </div>
          </div>
        </div>

        <!-- 主屏幕 -->
        <div class="home-screen hidden" id="homeScreen">
          <div class="status-bar">
            <div class="status-left">
              <span class="status-time" id="homeTime">00:00</span>
            </div>
            <div class="status-right">
              <span class="status-signal">📶</span>
              <span class="status-wifi">📡</span>
              <span class="status-battery">
                <span class="battery-icon">
                  <span class="battery-level" id="homeBattery"></span>
                </span>
                <span class="battery-text" id="homeBatteryText">80%</span>
              </span>
            </div>
          </div>
          <div class="home-content">
            <div class="app-grid" id="appGrid"></div>
          </div>
          <div class="home-dock">
            <div class="dock-bar" id="dockBar"></div>
          </div>
          <div class="home-indicator">
            <div class="home-indicator-line"></div>
          </div>
        </div>

        <!-- 应用容器 -->
        <div class="app-container hidden" id="appContainer">
          <div class="app-header">
            <div class="status-bar app-status-bar">
              <div class="status-left">
                <span class="status-time" id="appTime">00:00</span>
              </div>
              <div class="status-right">
                <span class="status-signal">📶</span>
                <span class="status-wifi">📡</span>
                <span class="status-battery">
                  <span class="battery-icon">
                    <span class="battery-level" id="appBattery"></span>
                  </span>
                </span>
              </div>
            </div>
            <div class="app-nav-bar">
              <button class="nav-back" id="btnAppBack" onclick="goHome()">
                <span class="back-arrow">‹</span> 返回
              </button>
              <span class="nav-title" id="appTitle">应用</span>
              <div class="nav-placeholder"></div>
            </div>
          </div>
          <div class="app-body" id="appBody"></div>
        </div>
      </div>

      <div class="phone-buttons">
        <button class="power-btn" id="powerBtn" title="电源键"></button>
        <button class="vol-btn vol-up" title="音量+"></button>
        <button class="vol-btn vol-down" title="音量-"></button>
      </div>

      <div class="phone-home-btn" id="homeBtn" onclick="goHome()"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
